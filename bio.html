<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabriel Coltz</title>
  <meta name="description" content="Estratégia · Branding · Inteligência Artificial" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --surface: #111111;
      --border:  #1e1e1e;
      --cyan:    #47e4be;
      --purple:  #5a3d7f;
      --text:    #f0f0f0;
      --muted:   #555555;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 52px 20px 72px;
    }

    /* Glow de fundo */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(71,228,190,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── FOTO ── */
    .profile-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .profile-photo {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top center;
      border: 2px solid var(--cyan);
      display: block;
      filter: grayscale(15%);
    }
    .profile-dot {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 14px;
      height: 14px;
      background: #1adf8e;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    /* ── NOME ── */
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      letter-spacing: 0.06em;
      color: var(--text);
      text-align: center;
      line-height: 1;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--cyan);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
      text-align: center;
      margin-bottom: 40px;
    }

    /* ── BLOCOS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 36px;
    }

    .block {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      padding: 20px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .block::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(71,228,190,0.04), transparent 60%);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .block:hover {
      border-color: rgba(71,228,190,0.4);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }
    .block:hover::after { opacity: 1; }

    .block-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .block-icon svg { width: 22px; height: 22px; }

    .block-icon.cyan   { background: rgba(71,228,190,0.12);  }
    .block-icon.purple { background: rgba(90,61,127,0.30);   }
    .block-icon.white  { background: rgba(240,240,240,0.07); }

    .block-icon.cyan   svg { stroke: var(--cyan);   }
    .block-icon.purple svg { stroke: #a78bca;       }
    .block-icon.white  svg { stroke: #c0c0c0;       }

    .block-label {
      flex: 1;
      min-width: 0;
    }
    .block-label strong {
      display: block;
      font-weight: 600;
      font-size: 0.97rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .block-label span {
      display: block;
      font-size: 0.76rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .block-arrow {
      color: var(--muted);
      font-size: 1rem;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }
    .block:hover .block-arrow {
      color: var(--cyan);
      transform: translateX(3px);
    }

    /* ── DIVISOR ── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }

    /* ── SOCIAIS ── */
    .socials {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
    }
    .social {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }
    .social:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      transform: translateY(-2px);
    }
    .social svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* ── RODAPÉ ── */
    .footer {
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.08em;
    }
    .footer a { color: var(--cyan); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Foto -->
    <div class="profile-wrap">
      <img src="/foto-gabriel.png" alt="Gabriel Coltz" class="profile-photo" />
      <div class="profile-dot"></div>
    </div>

    <!-- Nome -->
    <h1 class="name">Gabriel Coltz</h1>

    <!-- Blocos principais -->
    <div class="links">

      <!-- Portfólio -->
      <a href="https://gabriel-coltz-portfolio.vercel.app/" class="block" target="_blank" rel="noopener">
        <div class="block-icon cyan">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>

      <!-- Formulário Redes Sociais -->
      <a href="/formulario-social-media.html" class="block">
        <div class="block-icon purple">

            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>

        </div>
        <div class="block-label">

        <span class="block-arrow">→</span>
      </a>

      <!-- Organic -->
      <a href="https://www.organic-mkt.com.br/" class="block" target="_blank" rel="noopener">
        <div class="block-icon white">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4"/>

        <div class="block-label">
          <strong>Organic</strong>
          <span>organic-mkt.com.br</span>
        </div>
        <span class="block-arrow">→</span>
      </a>

    </div>

    <!-- Divisor -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Redes sociais</span>
      <div class="divider-line"></div>
    </div>

    <!-- Sociais -->
    <div class="socials">
      <!-- Instagram -->
      <a href="https://instagram.com/orgnicmkt" class="social" target="_blank" rel="noopener" title="Instagram">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".8" fill="currentColor" stroke="none"/></svg>
      </a>
      <!-- LinkedIn -->
      <a href="https://linkedin.com/in/gabrielcoltz" class="social" target="_blank" rel="noopener" title="LinkedIn">
        <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
      <!-- WhatsApp -->
      <a href="https://wa.me/5551993909150" class="social" target="_blank" rel="noopener" title="WhatsApp">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </a>
      <!-- Email -->
      <a href="mailto:gabriel@organic.com.br" class="social" title="E-mail">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </a>
    </div>

    <!-- Rodapé -->
    <p class="footer">© 2026 Gabriel Coltz &nbsp;·&nbsp; <a href="https://www.organic-mkt.com.br/">Organic</a></p>

  </div>
</body>
</html>
