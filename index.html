<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml"
    href="https://organic-mkt.com.br/wp-content/uploads/2021/09/cropped-favicon-organic-32x32.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organic | Branding & Marketing</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#47e4be',
            organic: {
              cyan: '#47e4be',
              purple: '#5a3d7f',
              black: '#232323',
              white: '#e6e6e6',
              gray: '#333333'
            }
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
            display: ['Bebas Neue', 'cursive'],
          },
          keyframes: {
            "pulse-slow": {
              '0%, 100%': { transform: 'translateX(-100%)' },
              '50%': { transform: 'translateX(100%)' },
            },
          },
          animation: {
            "pulse-slow": "pulse-slow 3s ease-in-out infinite",
          },
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #232323;
      color: #e6e6e6;
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #232323;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 5px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #47e4be;
    }

    /* Animations */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }

    .animate-fade-in-up {
      opacity: 1;
      transform: translateY(0);
    }

    /* Utility to hide scrollbar */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes shine {
      0% {
        transform: translateX(-100%);
      }

      50% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
        radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)),
        radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
        radial-gradient(2px 2px at 130px 80px, #fff, rgba(0, 0, 0, 0)),
        radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0, 0, 0, 0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: twinkle 5s ease-in-out infinite;
      opacity: 0.5;
    }

    @keyframes twinkle {
      0% {
        opacity: 0.5;
      }

      50% {
        opacity: 0.8;
      }

      100% {
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
